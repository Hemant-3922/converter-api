# allow bigger files
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Spring Boot server
server.port=8080

# JODConverter configuration
jodconverter.local.enabled=true
jodconverter.local.office-home=/Applications/LibreOffice.app/Contents

jodconverter.local.port-numbers=2002


spring.datasource.url=jdbc:mysql://localhost:3306/wonderdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
